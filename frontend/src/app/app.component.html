<div class="app-shell">
  <h1>Image Manager App</h1>

  <div class="d-flex gap-2 mb-4">
    <button
      class="btn"
      [class.btn-primary]="activeView === 'upload'"
      [class.btn-outline-primary]="activeView !== 'upload'"
      (click)="setActiveView('upload')"
    >
      Upload An Image
    </button>
    <button
      class="btn"
      [class.btn-primary]="activeView === 'generate'"
      [class.btn-outline-primary]="activeView !== 'generate'"
      (click)="setActiveView('generate')"
    >
      Create An Image
    </button>
  </div>

  <app-upload-image
    *ngIf="activeView === 'upload'"
    (imageSaved)="loadAllImages()"
  ></app-upload-image>

  <app-generate-image
    *ngIf="activeView === 'generate'"
    (imageSaved)="loadAllImages()"
  ></app-generate-image>

  <div class="row mb-4 mt-4">
    <div class="col d-flex flex-wrap gap-2">
      <button class="btn btn-secondary" (click)="loadAllImages()">
        All Images Revealed
      </button>
      <button
        class="btn btn-secondary"
        (click)="clearImages()"
        [disabled]="!isImageVisible || imageUrls.length === 0"
      >
        Clear Images From Screen
      </button>
    </div>
  </div>

  <div *ngIf="isImageVisible" class="row row-cols-3 g-3">
    <div class="col" *ngFor="let item of imageUrls">
      <img
        [src]="item.url"
        class="img-fluid rounded"
        [class.image-selected]="selectedImageIds.has(item.id)"
        (click)="selectImage(item); $event.stopPropagation()"
        style="cursor: pointer; width: 100%; height: 150px; object-fit: cover"
      />
    </div>
  </div>

  <div *ngIf="isImageVisible && totalPages > 1" class="d-flex align-items-center gap-3 mt-4">
    <button class="btn btn-outline-secondary" (click)="prevPage()" [disabled]="currentPage === 0">
      &laquo; Prev
    </button>
    <span>Page {{ currentPage + 1 }} of {{ totalPages }}</span>
    <button class="btn btn-outline-secondary" (click)="nextPage()" [disabled]="currentPage === totalPages - 1">
      Next &raquo;
    </button>
  </div>

  <div *ngIf="selectedImageIds.size > 0" class="mt-3">
    <button
      class="btn btn-danger"
      (click)="openDeleteModal(); $event.stopPropagation()"
    >
      Delete Selected ({{ selectedImageIds.size }})
    </button>
  </div>

  <app-confirm-delete-modal
    [selectedImageUrl]="selectedImageUrl"
    [selectedCount]="selectedImageIds.size"
    [isModalVisible]="isModalVisible"
    (onConfirm)="onDeleteConfirm()"
    (onCancel)="onDeleteCancel()"
  ></app-confirm-delete-modal>
</div>
