<div class="backdrop" *ngIf="isModalVisible" (click)="onModalCancel()">
  <div class="modal" (click)="$event.stopPropagation()">
    <img [src]="selectedImageUrl" width="100" />
    <p>Delete this image from the database?</p>

    <button (click)="onDeleteConfirm()">OK</button>
    <button (click)="onDeleteCancel()">Cancel</button>
  </div>
</div>
